name: CI

# Roda a cada push e a cada PR — requisito do desafio.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:   # permite disparar manualmente pela aba Actions

# Se você empurrar 2 commits seguidos, cancela a run antiga.
# Economiza minutos e evita "CI verde" de um commit velho.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # 1. LINT — o mais barato. Falha em ~20s se o código está torto.
  # ---------------------------------------------------------------
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          # clang-format vem do pip com versao FIXA, e nao do apt.
          # O `apt install clang-format` segue a imagem do runner: hoje entrega a 18, amanha outra.
          # Versoes diferentes discordam da largura de coluna de caracteres UTF-8 e realinham
          # comentarios a direita sozinhas -- o lint quebraria num bump da imagem, sem ninguem
          # ter tocado no codigo. Formate localmente com ESTA versao.
          pip install clang-format==20.1.8
          clang-format --version
          sudo apt-get update -qq
          sudo apt-get install -y cppcheck

      - name: Check formatting (clang-format)
        run: |
          find components main tests -name '*.c' -o -name '*.h' \
            | xargs clang-format --dry-run --Werror

      - name: Static analysis (cppcheck)
        run: |
          cppcheck --enable=warning,style,performance \
                   --inline-suppr \
                   --suppress=missingIncludeSystem \
                   --error-exitcode=1 \
                   -I components/cron/include \
                   components/cron/src

  # ---------------------------------------------------------------
  # 2. HOST TESTS — testa o parser CRON fora do alvo.
  #    Só é possível porque components/cron não depende do ESP-IDF.
  # ---------------------------------------------------------------
  host-tests:
    name: Host tests (CRON parser)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S tests/host -B build-host -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build-host --parallel

      - name: Run tests
        run: ctest --test-dir build-host --output-on-failure

  # ---------------------------------------------------------------
  # 3. BUILD — o requisito obrigatório: o projeto ESP-IDF compila.
  # ---------------------------------------------------------------
  build:
    name: Build (ESP-IDF ${{ matrix.idf_version }})
    runs-on: ubuntu-latest
    needs: [lint, host-tests]   # não gasta 5 min se o básico já falhou
    strategy:
      fail-fast: false
      matrix:
        idf_version: [v5.3]     # fixe a versão. Nada de "latest".
        target: [esp32]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ matrix.idf_version }}
          target: ${{ matrix.target }}
          path: '.'

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.target }}-${{ github.sha }}
          path: |
            build/*.bin
            build/*.elf
            build/flash_args
          if-no-files-found: error
          retention-days: 14
